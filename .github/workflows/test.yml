name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  SECURITY_ENFORCEMENT: 'false'

jobs:
  quality-checks:
    name: Quality Checks (Staged Enforcement)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install backend linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pyright

      - name: Run backend lint and type checks
        working-directory: ./backend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            flake8 .
            black --check .
            isort --check-only .
            pyright
          else
            flake8 . || true
            black --check . || true
            isort --check-only . || true
            pyright || true
          fi

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend lint and format checks
        working-directory: ./frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run lint
            npm run format:check
          else
            npm run lint || true
            npm run format:check || true
          fi

  security-scan:
    name: Security Scan (Staged Enforcement)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Run backend dependency and static security scans
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety bandit
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${SECURITY_ENFORCEMENT}" = "true" ]; then
            pip-audit
            safety check
            bandit -r . -ll --exclude ./tests
          else
            pip-audit || true
            safety check || true
            bandit -r . -ll --exclude ./tests || true
          fi

      - name: Run frontend dependency scan
        working-directory: ./frontend
        run: |
          npm ci
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${SECURITY_ENFORCEMENT}" = "true" ]; then
            npm audit --audit-level=high
          else
            npm audit --audit-level=high || true
          fi

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          TESTING: 'True'
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=70
          
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage
        
      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  scripts-tests:
    name: Scripts Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install backend dependencies for script tests
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run script tests
        working-directory: ./backend
        run: |
          pytest tests/test_scripts/ -v --cov=../scripts --cov-report=term-missing
